name: Deploy Backend (Hugging Face)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone HF Space (skip LFS files initially)
          GIT_LFS_SKIP_SMUDGE=1 git clone https://huggingface.co/spaces/sharjeel17/fashion-cnn hf-space
          cd hf-space

          # Configure git credentials BEFORE LFS operations
          git config user.email "action@github.com"
          git config user.name "github-actions"
          
          # Set up credential helper for HF token
          git config credential.helper '!f() { echo "username=oauth2"; echo "password=${HF_TOKEN}"; }; f'

          # Initialize and pull LFS files with authentication
          git lfs install
          git lfs pull

          # Copy backend files into HF repo (preserve .git folder)
          rsync -av --delete --exclude='.git/' ../backend/ ./

          # Stage and commit changes
          git add .
          git diff --cached --quiet || git commit -m "🚀 Auto-deploy from GitHub Actions - $(date '+%Y-%m-%d %H:%M:%S UTC')"

          # Push to Hugging Face
          git push https://huggingface.co/spaces/sharjeel17/fashion-cnn main