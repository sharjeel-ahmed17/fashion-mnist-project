name: Deploy Backend (Hugging Face)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone HF Space (skip LFS files initially)
          GIT_LFS_SKIP_SMUDGE=1 git clone https://huggingface.co/spaces/sharjeel17/fashion-cnn hf-space
          cd hf-space

          # Configure git
          git config user.email "action@github.com"
          git config user.name "github-actions"

          # Set credentials for LFS operations
          git config credential.helper store
          echo "https://oauth2:${HF_TOKEN}@huggingface.co" > .git/credentials
          git config credential.helper 'store --file=.git/credentials'

          # Pull LFS files
          git lfs install
          git lfs pull

          # Copy backend files into HF repo (preserve .git folder)
          rsync -av --delete --exclude='.git/' ../backend/ ./

          # Stage and commit changes
          git add .
          
          # Add timestamp to README to trigger rebuild
          echo "# Auto-deployed: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> README.md
          git add README.md
          
          git diff --cached --quiet || git commit -m "🚀 Auto-deploy from GitHub Actions - $(date '+%Y-%m-%d %H:%M:%S UTC')"

          # Push to Hugging Face with token in URL
          git remote set-url origin https://oauth2:${HF_TOKEN}@huggingface.co/spaces/sharjeel17/fashion-cnn
          git push origin main