name: Deploy Backend (Hugging Face)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"

      # ✅ DEBUG STEP (very important)
      - name: Check HF Token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ ERROR: HF_TOKEN missing"
            exit 1
          else
            echo "✅ HF_TOKEN موجود ہے"
          fi

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone HF Space
          GIT_LFS_SKIP_SMUDGE=1 git clone https://huggingface.co/spaces/sharjeel17/fashion-cnn hf-space

          # Go into repo
          cd hf-space

          # Setup Git
          git config user.email "action@github.com"
          git config user.name "github-actions"

          # Setup LFS
          git lfs install
          git lfs pull

          cd ..

          # Sync backend folder → HF repo
          rsync -av --delete --exclude='.git/' backend/ hf-space/

          cd hf-space

          # Add changes
          git add .

          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "🚀 Auto deploy $(date '+%Y-%m-%d %H:%M:%S')"

          # 🔥 CRITICAL FIX (AUTH)
          git remote set-url origin https://oauth2:${HF_TOKEN}@huggingface.co/spaces/sharjeel17/fashion-cnn

          # Push (reliable)
          git push origin HEAD:main