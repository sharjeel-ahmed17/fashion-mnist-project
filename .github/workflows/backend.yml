name: Deploy Backend (Hugging Face)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone HF Space with full history
          git clone https://oauth2:$HF_TOKEN@huggingface.co/spaces/sharjeel17/fashion-cnn hf-space

          # Copy backend files into HF repo
          rsync -av --delete backend/ hf-space/

          cd hf-space

          # Configure git for this repo
          git config user.email "action@github.com"
          git config user.name "github-actions"

          # Stage and commit changes
          git add .
          git diff --cached --quiet || git commit -m "🚀 Auto-deploy from GitHub Actions - $(date '+%Y-%m-%d %H:%M:%S UTC')"

          # Push to Hugging Face
          git push https://oauth2:$HF_TOKEN@huggingface.co/spaces/sharjeel17/fashion-cnn main