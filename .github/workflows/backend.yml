name: Deploy Backend (Hugging Face)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "github-actions"

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone HF Space (skip LFS heavy files first)
          GIT_LFS_SKIP_SMUDGE=1 git clone https://huggingface.co/spaces/sharjeel17/fashion-cnn hf-space

          cd hf-space

          # Setup Git inside HF repo
          git config user.email "action@github.com"
          git config user.name "github-actions"

          # Install Git LFS
          git lfs install

          # Pull existing LFS files (model etc.)
          git lfs pull

          cd ..

          # Sync backend → HF Space
          rsync -av --delete --exclude='.git/' backend/ hf-space/

          cd hf-space

          # Stage changes
          git add .

          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "🚀 Auto deploy - $(date '+%Y-%m-%d %H:%M:%S')"

          # 🔥 FIXED AUTH (IMPORTANT)
          git remote set-url origin https://oauth2:${HF_TOKEN}@huggingface.co/spaces/sharjeel17/fashion-cnn

          # Push
          git push origin main